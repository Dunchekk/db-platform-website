<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Not Found</title><script>(function () {
        try {
          var hostname = window.location.hostname;
          var isGithubIo = /(^|\.)github\.io$/i.test(hostname);

          var pathname = window.location.pathname;
          var segments = pathname.split("/").filter(Boolean);

          // GitHub Pages project site: /<repo>/<route...>
          // Custom domain (or non-github.io): /<route...>
          var base = isGithubIo && segments.length > 0 ? "/" + segments[0] : "";
          var rest = pathname.slice(base.length) || "/";

          var redirect = rest + window.location.search + window.location.hash;
          var target = base + "/?redirect=" + encodeURIComponent(redirect);

          window.location.replace(target);
        } catch (e) {
          // no-op
        }
      })();</script></head><body></body></html>
